name: CI/CD

# Tests run on every push and PR. The web bundle is built ONCE in `test` and the
# same artifact is promoted to each environment (build once, deploy many):
#   pull_request    -> dev      (DEPLOY_ENV=dev, shared PR integration env)
#   push to main    -> staging  (DEPLOY_ENV=staging, automatic)
#                      then prod (DEPLOY_ENV=prod), behind a manual approval gate
#   any other push  -> test only, no deploy
on:
  push:
  pull_request:
  workflow_dispatch:

# Serialize runs per ref, and never auto-cancel: cancelling a run mid-deploy can
# leave CloudFormation in UPDATE_IN_PROGRESS. Same-environment deploys across
# different refs are additionally serialized by per-job concurrency below.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # required by the OIDC role assumption in deploy jobs

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      # min-release-age cooldown is for `npm install`/`update`; npm 11 also applies it
      # to `npm ci`, which must install the vetted lockfile verbatim — so override it off.
      - run: npm_config_min_release_age=0 npm ci
      # Required before the infra tests: the BucketDeployment asset reads src/web/dist.
      # build:web also runs `tsc --noEmit`, so it type-checks the frontend.
      - run: npm run build:web
      - run: npm run format:check
      - run: npm run lint
      # Type-check the infra workspace incl. files no test imports (e.g. the OIDC
      # stack/app), which ts-jest alone wouldn't reach.
      - run: npx tsc --noEmit
        working-directory: infra
      # Synth-only assertions + cdk-nag gate — no AWS calls. test/setup.ts injects
      # DEPLOY_ENV=test and test-only domain/cert values, so no secrets are needed.
      - run: npm test -w infra
      # Publish the bundle built above so every deploy job promotes these exact
      # bytes instead of recompiling — the build the gate approves is the build
      # that ships. The web build is env-agnostic, so one artifact serves all envs.
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: src/web/dist
          retention-days: 7
          if-no-files-found: error

  # Every PR deploys the built artifact to the shared `dev` environment so the
  # change can be viewed live before merge. Multiple open PRs share one stack and
  # are serialized below (last deploy wins) — see the deploy-dev concurrency group.
  deploy-dev:
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: dev
    # Serialize all dev deploys (across PRs) onto one CloudFormation op.
    concurrency:
      group: deploy-dev
      cancel-in-progress: false
    env:
      DEPLOY_ENV: dev
      SITE_DOMAIN_NAME: ${{ vars.SITE_DOMAIN_NAME }}
      ACM_CERT_ARN: ${{ vars.ACM_CERT_ARN }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/deploy-cdk
        with:
          aws-role-arn: ${{ vars.AWS_DEPLOY_ROLE_ARN }}

  # Auto-deploys on every push to main: staging is the pre-prod dress rehearsal
  # that always reflects "what's about to ship". No gate here — the gate is on prod.
  deploy-staging:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    env:
      DEPLOY_ENV: staging
      SITE_DOMAIN_NAME: ${{ vars.SITE_DOMAIN_NAME }}
      ACM_CERT_ARN: ${{ vars.ACM_CERT_ARN }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/deploy-cdk
        with:
          aws-role-arn: ${{ vars.AWS_DEPLOY_ROLE_ARN }}

  # Promotes the same artifact to prod after staging. The `prod` environment's
  # required-reviewer rule (configured in repo Settings) makes this job pause as
  # "Waiting" until you approve it — that's the manual promotion gate (the button).
  deploy-prod:
    # TODO(human): wire the prod gate. Replace the inert `if: false` and add a
    # `needs:` line so this job (a) runs ONLY after staging succeeds and (b) ONLY
    # on a push to main — preserving the one-way flow toward prod. `if: false`
    # keeps prod from ever deploying until you complete this.
    if: false
    runs-on: ubuntu-latest
    environment: prod
    # Never run two production deploys at once.
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    env:
      DEPLOY_ENV: prod
      SITE_DOMAIN_NAME: ${{ vars.SITE_DOMAIN_NAME }}
      ACM_CERT_ARN: ${{ vars.ACM_CERT_ARN }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/deploy-cdk
        with:
          aws-role-arn: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
